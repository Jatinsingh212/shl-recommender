<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHL Assessment Recommender</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #2563eb;
            --brand-light: #eff6ff;
            --bg: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-shell {
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            background: var(--surface);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        header {
            padding: 20px 32px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--brand);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1rem;
        }

        .connection-status {
            font-size: 0.8rem;
            color: #10b981;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            padding: 6px 12px;
            background: #ecfdf5;
            border-radius: 20px;
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            background: var(--brand-light);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .message {
            max-width: 75%;
            padding: 16px 20px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.6;
            position: relative;
            box-shadow: var(--shadow-sm);
        }

        .bot-message {
            align-self: flex-start;
            background: var(--surface);
            color: var(--text-main);
            border-top-left-radius: 2px;
            border: 1px solid var(--border);
        }

        .user-message {
            align-self: flex-end;
            background: var(--brand);
            color: white;
            border-top-right-radius: 2px;
        }

        .recommendations {
            margin-top: 16px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .rec-item {
            background: var(--brand-light);
            border: 1px solid rgba(37, 99, 235, 0.1);
            padding: 14px 18px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            transition: transform 0.2s, background 0.2s;
        }

        .rec-item:hover {
            background: #dbeafe;
            transform: translateX(4px);
        }

        .rec-info {
            display: flex;
            flex-direction: column;
        }

        .rec-name {
            font-weight: 600;
            color: var(--brand);
            font-size: 0.9rem;
        }

        .rec-type {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .rec-action {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--brand);
            background: white;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        footer {
            padding: 24px 32px;
            background: white;
            border-top: 1px solid var(--border);
        }

        .input-area {
            display: flex;
            gap: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 10px 10px 10px 20px;
            border-radius: 14px;
            transition: box-shadow 0.2s, border-color 0.2s;
        }

        .input-area:focus-within {
            background: white;
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        input {
            flex: 1;
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            color: var(--text-main);
        }

        button {
            background: var(--brand);
            color: white;
            border: none;
            padding: 0 20px;
            height: 40px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading-text {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
            display: none;
        }

        #chat-window::-webkit-scrollbar {
            width: 8px;
        }

        #chat-window::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <header>
            <div class="logo">
                <div class="logo-icon">S</div>
                SHL Recommender
            </div>
            <div class="connection-status">
                <span style="width: 8px; height: 8px; background: #10b981; border-radius: 50%;"></span>
                AI Agent Active
            </div>
        </header>

        <div id="chat-window">
            <div class="message bot-message">
                Welcome. I can help you identify the most suitable SHL assessments for your talent acquisition needs. Which role or skill set are you currently evaluating?
            </div>
        </div>

        <footer>
            <div id="loading" class="loading-text">Analyzing your request...</div>
            <form id="chat-form">
                <div class="input-area">
                    <input type="text" id="user-input" placeholder="Enter role requirements or job description..." autocomplete="off">
                    <button type="submit" id="send-btn">Send</button>
                </div>
            </form>
        </footer>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const loadingText = document.getElementById('loading');

        let history = [];

        function addMessage(content, isUser = false, recommendations = []) {
            const msg = document.createElement('div');
            msg.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            msg.textContent = content;

            if (recommendations && recommendations.length > 0) {
                const recs = document.createElement('div');
                recs.className = 'recommendations';
                recommendations.forEach(r => {
                    const a = document.createElement('a');
                    a.className = 'rec-item';
                    a.href = r.url;
                    a.target = '_blank';
                    a.innerHTML = `
                        <div class="rec-info">
                            <span class="rec-name">${r.name}</span>
                            <span class="rec-type">${r.test_type}</span>
                        </div>
                        <div class="rec-action">View Test</div>
                    `;
                    recs.appendChild(a);
                });
                msg.appendChild(recs);
            }

            chatWindow.appendChild(msg);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text || sendBtn.disabled) return;

            userInput.value = '';
            addMessage(text, true);
            history.push({ role: 'user', content: text });

            loadingText.style.display = 'block';
            sendBtn.disabled = true;

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: history })
                });
                
                const data = await res.json();
                addMessage(data.reply, false, data.recommendations);
                history.push({ role: 'assistant', content: data.reply });
            } catch (err) {
                addMessage("I encountered a connection issue. Please try again.", false);
            } finally {
                loadingText.style.display = 'none';
                sendBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
